! =============================================
! Intended Configuration for chi-dc1-fw-01
! Location: CHI-DC1
! Role: Firewall
! Platform: Palo Alto PAN-OS
! =============================================
!
set deviceconfig system hostname chi-dc1-fw-01
set deviceconfig system domain techademy.lab
set deviceconfig system timezone UTC
!
! --- DNS ---
set deviceconfig system dns-setting servers primary 10.100.0.10
set deviceconfig system dns-setting servers secondary 10.100.0.11
!
! --- NTP ---
set deviceconfig system ntp-servers primary-ntp-server ntp-server-address 10.100.0.1
set deviceconfig system ntp-servers secondary-ntp-server ntp-server-address 10.200.0.99
!
! --- Logging / Syslog ---
set deviceconfig system syslog server 10.200.0.990 transport UDP port 514 facility LOG_USER
!
! --- SNMP ---
set deviceconfig system snmp-setting snmp-system location "CHI-DC1"
set deviceconfig system snmp-setting snmp-system contact "noc@techademy.lab"
set deviceconfig system snmp-setting access-setting version v2c snmp-community-string TechademyRO
!
! --- Banner ---
set deviceconfig system login-banner "AUTHORIZED ACCESS ONLY - chi-dc1-fw-01 at CHI-DC1"
!
