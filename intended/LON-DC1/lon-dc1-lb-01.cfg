!
! =============================================
! Intended Configuration for lon-dc1-lb-01
! Location: LON-DC1
! Role: Load Balancer
! Platform: F5 BIG-IP
! =============================================
!
! --- F5 BIG-IP Load Balancer ---
!
sys global-settings {
    hostname lon-dc1-lb-01.techademy.lab
    gui-setup disabled
}
!
! --- NTP Configuration ---
sys ntp {
    servers {
        10.100.0.1 { }
        10.100.0.2 { }
    }
    timezone UTC
}
!
! --- DNS Configuration ---
sys dns {
    name-servers {
        10.100.0.10
        10.100.0.11
    }
    search {
        techademy.lab
    }
}
!
! --- SNMP Configuration ---
sys snmp {
    allowed-addresses {
        10.0.0.0/8 { }
    }
    communities {
        TechademyRO {
            community-name TechademyRO
            access ro
        }
    }
    sys-location LON-DC1
    sys-contact noc@techademy.lab
}
!
! --- Syslog ---
sys syslog {
    remote-servers {
        10.100.0.20 {
            remote-port 514
        }
    }
}
!
! --- SSH Configuration ---
sys sshd {
    allow {
        10.0.0.0/8
    }
    inactivity-timeout 900
    login-grace-time 60
}
!
! --- Banner ---
sys sshd {
    banner enabled
    banner-text "
*************************************************************
* AUTHORIZED ACCESS ONLY                                    *
* Device: lon-dc1-lb-01 | Location: LON-DC1
*************************************************************
"
}
!
end
