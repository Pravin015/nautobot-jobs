# =============================================
# Intended Configuration for lon-dc1-srv-01
# Location: LON-DC1
# Role: Server
# Platform: Linux Server
# =============================================

# --- Hostname ---
hostname=lon-dc1-srv-01

# --- DNS Configuration ---
# /etc/resolv.conf
nameserver 10.100.0.10
nameserver 10.100.0.11
search techademy.lab

# --- NTP Configuration ---
# /etc/chrony.conf or /etc/ntp.conf
server 10.100.0.1 iburst prefer
server 10.100.0.2 iburst

# --- SNMP Configuration ---
# /etc/snmp/snmpd.conf
rocommunity TechademyRO
syslocation LON-DC1
syscontact noc@techademy.lab

# --- Logging Configuration ---
# /etc/rsyslog.d/remote.conf
*.* @10.100.0.20:514

# --- SSH Configuration ---
# /etc/ssh/sshd_config
Protocol 2
PermitRootLogin no
MaxAuthTries 3
ClientAliveInterval 300
ClientAliveCountMax 2
LoginGraceTime 60

# --- Banner ---
# /etc/issue.net
#####################################################
# AUTHORIZED ACCESS ONLY                           #
# Device: lon-dc1-srv-01                         #
# Location: LON-DC1              #
#####################################################
