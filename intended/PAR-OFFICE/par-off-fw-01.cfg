# =============================================
# Intended Configuration for par-off-fw-01
# Location: PAR-OFFICE
# Role: Firewall
# Platform: Fortinet FortiOS
# =============================================
#
config system global
    set hostname "par-off-fw-01"
    set timezone 00
end
#
# --- DNS ---
config system dns
    set primary 10.100.0.10
    set secondary 10.100.0.11
    set domain "techademy.lab"
end
#
# --- NTP ---
config system ntp
    set ntpsync enable
    set server-mode enable
    config ntpserver
        edit 1
            set server 10.100.0.1
        next
        edit 2
            set server 10.100.0.2
        next
    end
end
#
# --- SNMP ---
config system snmp community
    edit 1
        set name "TechademyRO"
        set status enable
        config hosts
            edit 1
                set ip 10.100.0.0 255.255.255.0
            next
        end
    next
end
config system snmp sysinfo
    set location "PAR-OFFICE"
    set contact-info "noc@techademy.lab"
end
#
# --- Logging ---
config log syslogd setting
    set status enable
    set server "10.100.0.20"
    set port 514
    set facility local7
end
#
# --- Banner ---
config system replacemsg admin "pre_admin-disclaimer-text"
    set buffer "AUTHORIZED ACCESS ONLY - par-off-fw-01 at PAR-OFFICE"
end
#
